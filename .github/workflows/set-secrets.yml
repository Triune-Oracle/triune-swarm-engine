name: Set Repository Secrets Across Triune-Oracle Repos

on:
  workflow_dispatch:           # manual trigger via GitHub UI or API
  schedule:
    - cron: '0 0 * * 0'       # weekly — Sunday at 00:00 UTC

jobs:
  update-secrets:
    name: Sync secrets to all target repos
    runs-on: ubuntu-latest
    # Restrict to the default branch so accidental runs on feature branches
    # don't propagate secrets.
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # The secrets payload is stored as a repository/org secret called SECRETS_JSON.
      # Its value must be a valid JSON array, e.g.:
      #   [{"name":"API_KEY","value":"..."},{"name":"DB_PASSWORD","value":"..."}]
      # NEVER commit an actual secrets.json file.  The script falls back to a local
      # secrets.json only for local development (which is gitignored).
      - name: Run set-secrets script
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          SECRETS_JSON: ${{ secrets.SECRETS_JSON }}
          # Optional: override the default repo list (comma-separated)
          # TARGET_REPOS: ${{ vars.TARGET_REPOS }}
        run: node scripts/set-secrets.js
